<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ 점심 커피 쏘기 사다리 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            200: '#eaddd7',
                            300: '#e0cec7',
                            400: '#d2bab0',
                            500: '#a38071',
                            600: '#8b6b5c',
                            700: '#6f564a',
                            800: '#5c453b',
                            900: '#44332b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        canvas { touch-action: none; }
        .player-btn { transition: transform 0.1s, box-shadow 0.1s; }
        .player-btn:active { transform: translateY(2px); box-shadow: none; }
        .hide { display: none !important; }
    </style>
</head>
<body class="bg-coffee-50 min-h-screen text-coffee-900 pb-12">

    <!-- 헤더 -->
    <header class="bg-coffee-800 text-white py-6 shadow-md text-center">
        <h1 class="text-3xl font-black tracking-tight"><i class="fa-solid fa-mug-hot text-coffee-300 mr-2"></i> 점심 커피 쏘기 사다리 게임</h1>
        <p class="mt-2 text-coffee-200">운명의 사다리를 타보세요! 오늘 커피를 쏠 사람은 누구?</p>
    </header>

    <main class="max-w-5xl mx-auto p-4 mt-6">
        
        <!-- 설정 영역 -->
        <section id="setup-section" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-coffee-100">
            <h2 class="text-2xl font-bold mb-6 text-coffee-800 border-b border-coffee-200 pb-2">1. 참가자 및 결과 설정</h2>
            
            <div class="grid md:grid-cols-2 gap-8">
                <!-- 참가자 입력 -->
                <div>
                    <label class="block text-sm font-bold text-coffee-700 mb-2">
                        <i class="fa-solid fa-users mr-1"></i> 참가자 이름 (쉼표로 구분)
                    </label>
                    <textarea id="players-input" rows="3" class="w-full px-4 py-3 rounded-xl border border-coffee-300 focus:ring-2 focus:ring-coffee-500 focus:border-coffee-500 outline-none transition-shadow resize-none">김팀장, 이대리, 박과장, 최인턴, 정사원</textarea>
                    <p class="text-xs text-gray-500 mt-2">* 2명에서 최대 10명까지 권장합니다.</p>
                </div>

                <!-- 결과 입력 -->
                <div>
                    <label class="block text-sm font-bold text-coffee-700 mb-2">
                        <i class="fa-solid fa-gift mr-1"></i> 당첨 항목 (쉼표로 구분)
                    </label>
                    <textarea id="results-input" rows="3" class="w-full px-4 py-3 rounded-xl border border-coffee-300 focus:ring-2 focus:ring-coffee-500 focus:border-coffee-500 outline-none transition-shadow resize-none">통과, 스타벅스 쏘기 ☕, 통과, 빽다방 쏘기 🥤, 통과</textarea>
                    <p class="text-xs text-gray-500 mt-2">* 참가자 수와 항목 수가 다르면 '통과'로 자동 채워집니다.</p>
                </div>
            </div>

            <div class="mt-8 text-center">
                <button id="btn-create" class="bg-coffee-600 hover:bg-coffee-700 text-white font-bold py-4 px-12 rounded-full shadow-lg hover:shadow-xl transition-all text-lg w-full md:w-auto">
                    사다리 만들기 <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
        </section>

        <!-- 게임 영역 -->
        <section id="game-section" class="hide bg-white rounded-2xl shadow-xl p-4 md:p-8 border border-coffee-100 flex flex-col items-center">
            
            <div class="w-full flex justify-between items-center mb-6">
                <button id="btn-back" class="text-coffee-600 hover:text-coffee-800 font-medium px-4 py-2 rounded-lg hover:bg-coffee-50 transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> 다시 설정하기
                </button>
                <div class="space-x-2">
                    <button id="btn-run-all" class="bg-coffee-500 hover:bg-coffee-600 text-white font-bold py-2 px-6 rounded-lg shadow transition-colors">
                        <i class="fa-solid fa-bolt mr-1"></i> 전체 결과 보기
                    </button>
                </div>
            </div>

            <!-- HTML DOM 기반 참가자 버튼들 -->
            <div id="player-buttons" class="w-full relative flex justify-between px-4 mb-2 z-10"></div>

            <!-- 사다리 캔버스 -->
            <div class="w-full relative overflow-x-auto overflow-y-hidden" style="min-height: 500px;">
                <canvas id="ladder-canvas" class="cursor-pointer block mx-auto"></canvas>
            </div>

            <!-- HTML DOM 기반 결과 텍스트들 -->
            <div id="result-labels" class="w-full relative flex justify-between px-4 mt-2 z-10"></div>

            <!-- 최종 결과 요약표 -->
            <div id="final-results" class="hide w-full mt-10 bg-coffee-50 p-6 rounded-xl border border-coffee-200">
                <h3 class="text-xl font-bold text-center mb-4 text-coffee-800"><i class="fa-solid fa-clipboard-check mr-2"></i> 최종 결과</h3>
                <ul id="result-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 text-lg"></ul>
            </div>

        </section>

    </main>

    <script>
        // --- 상태 변수 ---
        let players = [];
        let results = [];
        let rungs = []; // 가로줄 정보 배열: { row, col }
        let paths = []; // 각 플레이어의 이동 경로
        let canvas, ctx;
        let layout = {}; // 그리기 좌표 정보
        let animations = []; // 현재 진행중인 애니메이션 정보
        let isAnimating = false; // 전체 애니메이션 상태
        let completedCount = 0;

        // 색상 팔레트 (선명하고 구분하기 쉬운 색상들)
        const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#059669'];

        // --- DOM 요소 ---
        const setupSection = document.getElementById('setup-section');
        const gameSection = document.getElementById('game-section');
        const playersInput = document.getElementById('players-input');
        const resultsInput = document.getElementById('results-input');
        const btnCreate = document.getElementById('btn-create');
        const btnBack = document.getElementById('btn-back');
        const btnRunAll = document.getElementById('btn-run-all');
        const canvasEl = document.getElementById('ladder-canvas');
        const playerButtonsContainer = document.getElementById('player-buttons');
        const resultLabelsContainer = document.getElementById('result-labels');
        const finalResultsDiv = document.getElementById('final-results');
        const resultListUl = document.getElementById('result-list');

        // --- 초기화 및 이벤트 등록 ---
        function init() {
            canvas = canvasEl;
            ctx = canvas.getContext('2d');
            
            btnCreate.addEventListener('click', setupGame);
            btnBack.addEventListener('click', resetGame);
            btnRunAll.addEventListener('click', runAllAnimations);
            
            window.addEventListener('resize', handleResize);
        }

        // --- 게임 설정 ---
        function setupGame() {
            // 입력값 파싱 및 정리
            players = playersInput.value.split(',').map(s => s.trim()).filter(s => s !== '');
            results = resultsInput.value.split(',').map(s => s.trim()).filter(s => s !== '');

            if (players.length < 2) {
                alert('최소 2명 이상의 참가자가 필요합니다.');
                return;
            }
            if (players.length > 15) {
                alert('참가자가 너무 많습니다. 최대 15명까지만 권장합니다.');
                return;
            }

            // 결과 개수 맞추기 (부족하면 '통과', 남으면 자르기)
            while (results.length < players.length) {
                results.push('통과');
            }
            results = results.slice(0, players.length);

            // 섞기 옵션 (결과를 무작위로 섞음) - 원하면 켤 수 있음
            // results.sort(() => Math.random() - 0.5);

            // 화면 전환
            setupSection.classList.add('hide');
            gameSection.classList.remove('hide');
            finalResultsDiv.classList.add('hide');
            resultListUl.innerHTML = '';
            completedCount = 0;

            generateLadder();
            buildDOMUI();
            updateLayout();
            calculatePaths();
            drawBaseLadder();
        }

        function resetGame() {
            cancelAnimationFrame(window.animFrameId);
            gameSection.classList.add('hide');
            setupSection.classList.remove('hide');
            animations = [];
            isAnimating = false;
        }

        // --- 사다리 데이터 생성 ---
        function generateLadder() {
            rungs = [];
            const numCols = players.length;
            // 세로줄 길이에 비례하여 가로줄 행의 수를 결정 (기본 10행 ~ 플레이어수*2)
            const numRows = Math.max(10, numCols * 2);

            // 각 행(row)마다 가로줄(rung) 배치
            for (let r = 1; r < numRows; r++) {
                // 한 행에 여러 가로줄이 생길 수 있으나 서로 이어지지 않게 처리
                for (let c = 0; c < numCols - 1; c++) {
                    // 가로줄이 생길 확률 40%
                    if (Math.random() < 0.4) {
                        rungs.push({ row: r, col: c });
                        c++; // 인접한 열에 가로줄이 생기지 않도록 건너뜀 (사다리 겹침 방지)
                    }
                }
            }
            
            // 데이터 저장
            layout.numRows = numRows;
        }

        // --- DOM UI 구성 (버튼 및 결과 텍스트) ---
        function buildDOMUI() {
            playerButtonsContainer.innerHTML = '';
            resultLabelsContainer.innerHTML = '';
            
            // 플레이어 수에 따라 너비가 동적으로 변하게 설정
            const minWidth = players.length * 80; // 열당 최소 80px
            canvas.style.minWidth = `${minWidth}px`;
            playerButtonsContainer.style.minWidth = `${minWidth}px`;
            resultLabelsContainer.style.minWidth = `${minWidth}px`;

            players.forEach((player, i) => {
                // 플레이어 버튼
                const btn = document.createElement('button');
                btn.className = `player-btn absolute transform -translate-x-1/2 w-16 h-10 rounded-full font-bold text-sm shadow-md text-white border-b-4 focus:outline-none z-20`;
                btn.style.backgroundColor = colors[i % colors.length];
                btn.style.borderColor = adjustColorBrightness(colors[i % colors.length], -30);
                btn.textContent = player;
                btn.onclick = () => startAnimation(i);
                btn.id = `btn-player-${i}`;
                playerButtonsContainer.appendChild(btn);

                // 결과 라벨
                const res = document.createElement('div');
                res.className = `absolute transform -translate-x-1/2 w-20 text-center font-bold text-sm bg-gray-100 py-2 rounded shadow border border-gray-200 break-words opacity-50 transition-opacity duration-300`;
                res.textContent = results[i];
                res.id = `label-result-${i}`;
                
                // 특별한 결과(통과가 아닌 경우) 하이라이트
                if (results[i] !== '통과') {
                    res.classList.remove('bg-gray-100', 'text-gray-800');
                    res.classList.add('bg-amber-100', 'text-amber-900', 'border-amber-300');
                }
                
                resultLabelsContainer.appendChild(res);
            });
        }

        // --- 레이아웃 좌표 계산 ---
        function updateLayout() {
            const containerWidth = canvas.parentElement.clientWidth;
            const minWidth = players.length * 80;
            const width = Math.max(containerWidth, minWidth);
            const height = 500; // 캔버스 고정 높이

            // 디스플레이 해상도 대응 (Retina 등)
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = `${width}px`;
            canvas.style.height = `${height}px`;
            ctx.scale(dpr, dpr);

            layout.width = width;
            layout.height = height;
            layout.padX = width / (players.length * 2); // 좌우 여백
            layout.colWidth = (width - layout.padX * 2) / (players.length - 1 || 1);
            layout.padY = 20; // 상하 여백
            layout.rowHeight = (height - layout.padY * 2) / layout.numRows;

            // DOM 요소 위치 업데이트
            players.forEach((_, i) => {
                const xPos = layout.padX + i * layout.colWidth;
                
                const btn = document.getElementById(`btn-player-${i}`);
                if (btn) btn.style.left = `${xPos}px`;
                
                const res = document.getElementById(`label-result-${i}`);
                if (res) res.style.left = `${xPos}px`;
            });
        }

        function handleResize() {
            if (gameSection.classList.contains('hide')) return;
            updateLayout();
            if (isAnimating) {
                // 애니메이션 중 리사이즈 시 그냥 다시 그림
                drawFrame(); 
            } else {
                drawBaseLadder();
                // 완료된 경로 다시 그리기
                paths.forEach((p, i) => {
                    if (p.completed) drawPathFull(i);
                });
            }
        }

        // --- 경로 계산 ---
        // 각 시작점(플레이어)에서 목적지(결과)까지의 좌표를 미리 계산해 둠
        function calculatePaths() {
            paths = [];
            for (let i = 0; i < players.length; i++) {
                let currentCol = i;
                let pathCoords = [];
                
                // 시작점 (약간 위에서 시작)
                pathCoords.push({ col: currentCol, row: 0 });

                for (let r = 1; r < layout.numRows; r++) {
                    // 현재 위치까지 세로로 이동
                    pathCoords.push({ col: currentCol, row: r });

                    // 오른쪽으로 가는 사다리가 있는지 확인
                    const rightRung = rungs.find(rung => rung.row === r && rung.col === currentCol);
                    // 왼쪽으로 가는 사다리가 있는지 확인
                    const leftRung = rungs.find(rung => rung.row === r && rung.col === currentCol - 1);

                    if (rightRung) {
                        currentCol++;
                        pathCoords.push({ col: currentCol, row: r }); // 가로 이동
                    } else if (leftRung) {
                        currentCol--;
                        pathCoords.push({ col: currentCol, row: r }); // 가로 이동
                    }
                }
                
                // 끝점까지 세로로 이동
                pathCoords.push({ col: currentCol, row: layout.numRows });
                
                paths.push({
                    playerIndex: i,
                    resultIndex: currentCol,
                    coords: pathCoords, // 논리 좌표 (row, col)
                    completed: false
                });
            }
        }

        // 논리 좌표(row, col)를 실제 캔버스 좌표(x, y)로 변환
        function getActualPos(coord) {
            return {
                x: layout.padX + coord.col * layout.colWidth,
                y: layout.padY + coord.row * layout.rowHeight
            };
        }

        // --- 그리기 함수 ---
        // 기본 배경 사다리 그리기
        function drawBaseLadder() {
            ctx.clearRect(0, 0, layout.width, layout.height);
            
            // 세로줄 그리기
            ctx.strokeStyle = '#d2bab0'; // coffee-400
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (let i = 0; i < players.length; i++) {
                const x = layout.padX + i * layout.colWidth;
                ctx.beginPath();
                ctx.moveTo(x, layout.padY);
                ctx.lineTo(x, layout.height - layout.padY);
                ctx.stroke();
            }

            // 가로줄 그리기
            rungs.forEach(rung => {
                const x1 = layout.padX + rung.col * layout.colWidth;
                const x2 = layout.padX + (rung.col + 1) * layout.colWidth;
                const y = layout.padY + rung.row * layout.rowHeight;
                
                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();
            });
        }

        // 이미 완료된 경로 굵게 다시 그리기
        function drawPathFull(playerIndex) {
            const pathInfo = paths[playerIndex];
            const color = colors[playerIndex % colors.length];
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 6;
            ctx.beginPath();
            
            const startPos = getActualPos(pathInfo.coords[0]);
            ctx.moveTo(startPos.x, startPos.y);

            for (let i = 1; i < pathInfo.coords.length; i++) {
                const pos = getActualPos(pathInfo.coords[i]);
                ctx.lineTo(pos.x, pos.y);
            }
            ctx.stroke();
        }

        // --- 애니메이션 로직 ---
        function startAnimation(playerIndex) {
            if (paths[playerIndex].completed) return; // 이미 완료됨
            
            // 해당 플레이어 버튼 비활성화 시각 효과
            const btn = document.getElementById(`btn-player-${playerIndex}`);
            btn.style.transform = 'translateY(2px) translateX(-50%)';
            btn.style.boxShadow = 'none';
            btn.style.opacity = '0.8';

            // 애니메이션 큐에 추가
            animations.push({
                playerIndex: playerIndex,
                color: colors[playerIndex % colors.length],
                currentSegment: 0,
                progress: 0, // 현재 선분의 진행도 0.0 ~ 1.0
                speed: 0.08 // 이동 속도
            });

            if (!isAnimating) {
                isAnimating = true;
                drawFrame();
            }
        }

        function runAllAnimations() {
            // 아직 완료되지 않은 모든 플레이어 시작
            players.forEach((_, i) => {
                if (!paths[i].completed && !animations.find(a => a.playerIndex === i)) {
                    startAnimation(i);
                }
            });
            // 속도 높이기
            animations.forEach(a => a.speed = 0.15);
        }

        function drawFrame() {
            drawBaseLadder();

            // 완료된 경로들 먼저 그리기
            paths.forEach((p, i) => {
                if (p.completed) drawPathFull(i);
            });

            let activeCount = 0;

            // 현재 진행중인 애니메이션 그리기
            animations.forEach((anim, idx) => {
                const pathInfo = paths[anim.playerIndex];
                
                if (pathInfo.completed) return; // 이미 끝났으면 스킵
                activeCount++;

                // 지나온 전체 경로 그리기
                ctx.strokeStyle = anim.color;
                ctx.lineWidth = 6;
                ctx.beginPath();
                const startPos = getActualPos(pathInfo.coords[0]);
                ctx.moveTo(startPos.x, startPos.y);

                for (let i = 1; i <= anim.currentSegment; i++) {
                    const pos = getActualPos(pathInfo.coords[i]);
                    ctx.lineTo(pos.x, pos.y);
                }

                // 현재 그리고 있는 선분
                if (anim.currentSegment < pathInfo.coords.length - 1) {
                    const p1 = getActualPos(pathInfo.coords[anim.currentSegment]);
                    const p2 = getActualPos(pathInfo.coords[anim.currentSegment + 1]);
                    
                    const curX = p1.x + (p2.x - p1.x) * anim.progress;
                    const curY = p1.y + (p2.y - p1.y) * anim.progress;
                    
                    ctx.lineTo(curX, curY);

                    // 진행도 업데이트
                    anim.progress += anim.speed;
                    if (anim.progress >= 1.0) {
                        anim.progress = 0;
                        anim.currentSegment++;
                    }

                    // 현재 위치에 점 그리기 (캐릭터 느낌)
                    ctx.stroke(); // 선 먼저 끝내고
                    ctx.beginPath();
                    ctx.arc(curX, curY, 8, 0, Math.PI * 2);
                    ctx.fillStyle = anim.color;
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                } else {
                    // 도착 완료
                    ctx.stroke();
                    pathInfo.completed = true;
                    onPathComplete(anim.playerIndex, pathInfo.resultIndex);
                }
            });

            if (activeCount > 0) {
                window.animFrameId = requestAnimationFrame(drawFrame);
            } else {
                isAnimating = false;
                animations = []; // 큐 비우기
            }
        }

        // 플레이어 1명의 애니메이션이 끝났을 때
        function onPathComplete(playerIndex, resultIndex) {
            // 결과 라벨 하이라이트
            const resLabel = document.getElementById(`label-result-${resultIndex}`);
            if (resLabel) {
                resLabel.style.opacity = '1';
                resLabel.style.transform = 'translate(-50%, 5px) scale(1.1)';
                setTimeout(() => {
                    resLabel.style.transform = 'translate(-50%, 0) scale(1)';
                }, 300);
            }

            // 목록에 추가
            const li = document.createElement('li');
            li.className = 'flex justify-between items-center bg-white p-3 rounded shadow-sm';
            
            const pName = document.createElement('span');
            pName.className = 'font-bold';
            pName.style.color = colors[playerIndex % colors.length];
            pName.textContent = players[playerIndex];

            const pResult = document.createElement('span');
            pResult.className = 'font-bold text-gray-800';
            pResult.textContent = results[resultIndex];

            li.appendChild(pName);
            li.appendChild(pResult);
            resultListUl.appendChild(li);

            completedCount++;
            
            // 모든 플레이어가 완료되었는지 확인
            if (completedCount === players.length) {
                setTimeout(() => {
                    finalResultsDiv.classList.remove('hide');
                    // 스크롤 아래로 내리기
                    finalResultsDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 500);
            }
        }

        // --- 유틸 함수 ---
        // 버튼 보더 색상을 위해 밝기 조절 함수
        function adjustColorBrightness(col, amt) {
            let usePound = false;
            if (col[0] == "#") {
                col = col.slice(1);
                usePound = true;
            }
            let R = parseInt(col.substring(0,2),16);
            let G = parseInt(col.substring(2,4),16);
            let B = parseInt(col.substring(4,6),16);
            R = R + amt;
            G = G + amt;
            B = B + amt;
            if (R > 255) R = 255;
            else if (R < 0) R = 0;
            if (G > 255) G = 255;
            else if (G < 0) G = 0;
            if (B > 255) B = 255;
            else if (B < 0) B = 0;
            let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
            return (usePound?"#":"") + RR + GG + BB;
        }

        // 스크립트 로드 시 초기화 실행
        window.onload = init;

    </script>
